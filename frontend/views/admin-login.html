<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyTicket | Acceso Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/index.html" class="logo">
        <img src="/img/logo.png" alt="MyTicket" class="logo-img">
      </a>
      <div><a href="/" style="color:var(--text-secondary); font-family:'Poppins',sans-serif;">Inicio</a></div>
    </div>
  </nav>
  <div class="login-container">
    <div class="login-card admin-login-card">
      <div class="login-header"><i class="fas fa-user-shield"></i><h2>Portal Administrativo</h2></div>
      <form id="adminLoginForm">
        <input type="email" id="adminEmail" placeholder="Correo administrativo" required>
        <input type="password" id="adminPassword" placeholder="Contraseña" required>
        <button type="submit" class="btn-primary">Acceder al Panel</button>
      </form>
      <div id="errorMsg" class="toggle-link" style="color:#ff6666;"></div>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/starfield.js"></script>
  <script>
    createStarField();
    document.getElementById('adminLoginForm').onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('adminEmail').value;
      const password = document.getElementById('adminPassword').value;
      const errorDiv = document.getElementById('errorMsg');
      errorDiv.innerText = 'Verificando...';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ correo_usuario: email, contrasena: password }),
          credentials: 'include'
        });
        const data = await res.json();
        if (res.ok && data.success && data.user.isAdmin === true) {
          window.location.href = '/admin.html';
        } else {
          errorDiv.innerText = data.error || 'Credenciales incorrectas';
        }
      } catch (err) {
        errorDiv.innerText = 'Error de conexión: ' + err.message;
      }
    };
  </script>
</body>
</html>
